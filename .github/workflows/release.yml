name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Changelog ────────────────────────────────────────────────────────────────
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by git-cliff

      - uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: .cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: bethesda-strings-editor-linux-x64.zip
          - os: windows-latest
            artifact: bethesda-strings-editor-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Inject version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          echo "__version__ = '${VERSION}'" > _version.py
          echo "Building version ${VERSION}"

      - name: Compile Qt translations
        shell: bash
        run: |
          for ts in gui/translations/*.ts; do
            qm="${ts%.ts}.qm"
            pyside6-lrelease "$ts" -qm "$qm"
          done

      - name: Build with PyInstaller
        run: pyinstaller bethesda_strings_editor.spec

      # ── Windows code signing (optional) ──────────────────────────────────────
      # To enable: purchase an EV code signing certificate from DigiCert or
      # Sectigo (~$300-500/year), export it as a PFX file, and store it in
      # GitHub Secrets as SIGNING_CERTIFICATE (base64-encoded) and
      # SIGNING_PASSWORD.  Then uncomment the block below.
      #
      # - name: Sign Windows executable
      #   if: runner.os == 'Windows' && github.event_name == 'push'
      #   shell: pwsh
      #   env:
      #     SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE }}
      #     SIGNING_PASS: ${{ secrets.SIGNING_PASSWORD }}
      #   run: |
      #     $bytes = [Convert]::FromBase64String($env:SIGNING_CERT)
      #     $pfxPath = "$env:TEMP\cert.pfx"
      #     [IO.File]::WriteAllBytes($pfxPath, $bytes)
      #     $exe = "dist\bethesda-strings-editor\bethesda-strings-editor.exe"
      #     & signtool sign /fd sha256 /f $pfxPath /p $env:SIGNING_PASS `
      #         /tr http://timestamp.digicert.com /td sha256 $exe
      #     Remove-Item $pfxPath

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../${{ matrix.artifact }} bethesda-strings-editor/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\bethesda-strings-editor\* -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  # ── Release ───────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          body: ${{ needs.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── NexusMods Upload ──────────────────────────────────────────────────────────
  # Requires three repository secrets:
  #   NEXUSMODS_API_KEY            — from https://www.nexusmods.com/users/myaccount?tab=api
  #   NEXUSMODS_FILE_GROUP_ID_LINUX   — Files tab → ⋯ → API Info on your mod page
  #   NEXUSMODS_FILE_GROUP_ID_WINDOWS — same, for the Windows file group
  nexusmods:
    name: Upload to NexusMods
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    env:
      NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload Linux build
        if: env.NEXUSMODS_API_KEY != ''
        uses: Nexus-Mods/upload-action@v1.0.0-beta.6
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID_LINUX }}
          filename: bethesda-strings-editor-linux-x64.zip
          version: ${{ steps.ver.outputs.version }}
          display_name: Bethesda Strings Editor ${{ steps.ver.outputs.version }} (Linux x64)
          file_category: main
          archive_existing_file: true

      - name: Upload Windows build
        if: env.NEXUSMODS_API_KEY != ''
        uses: Nexus-Mods/upload-action@v1.0.0-beta.6
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID_WINDOWS }}
          filename: bethesda-strings-editor-windows-x64.zip
          version: ${{ steps.ver.outputs.version }}
          display_name: Bethesda Strings Editor ${{ steps.ver.outputs.version }} (Windows x64)
          file_category: main
          archive_existing_file: true
