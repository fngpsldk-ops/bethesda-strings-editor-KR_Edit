name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: bethesda-strings-editor-linux-x64.zip
          - os: windows-latest
            artifact: bethesda-strings-editor-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Compile Qt translations
        shell: bash
        run: pyside6-lrelease gui/translations/uk_UA.ts -qm gui/translations/uk_UA.qm

      - name: Build with PyInstaller
        run: pyinstaller bethesda_strings_editor.spec

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r ../${{ matrix.artifact }} bethesda-strings-editor/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\bethesda-strings-editor\* -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
